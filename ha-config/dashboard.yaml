# Lovelace Dashboard — Rack Monitor
# Paste this into HA > Settings > Dashboards > (edit) > Raw configuration editor

title: Rack Monitor
views:
  - title: Growing Rack
    icon: mdi:sprout
    cards:
      - type: entities
        title: Environmental Readings
        entities:
          - entity: sensor.rack_temperature
            name: Air Temperature
          - entity: sensor.rack_humidity
            name: Relative Humidity
          - entity: sensor.rack_vpd
            name: VPD (calculated)

      - type: gauge
        title: VPD
        entity: sensor.rack_vpd
        min: 0
        max: 2
        needle: true
        segments:
          - from: 0
            color: "#2196F3"   # blue = too humid
          - from: 0.4
            color: "#4CAF50"   # green = ideal
          - from: 1.2
            color: "#F44336"   # red = too dry

      - type: entities
        title: Actuator
        entities:
          - entity: fan.rack_exhaust
            name: Exhaust Fan

      - type: history-graph
        title: Temperature & Humidity (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.rack_temperature
          - entity: sensor.rack_humidity

      - type: history-graph
        title: VPD (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.rack_vpd
