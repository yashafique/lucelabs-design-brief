# ESPHome Bridge Node
#
# Reads two non-native sensors and publishes them to Home Assistant as native entities:
#   - DFRobot SEN0193 capacitive soil moisture sensor (analog, GPIO34)
#   - DS18B20 waterproof temperature probe (1-Wire, GPIO4, 4.7k pull-up to 3.3V)
#
# Two syntax notes, both breaking changes that older examples online still get wrong:
#   1. "platform: dallas" was removed in ESPHome 2024.6.0. Use a "one_wire:" bus
#      and a "dallas_temp" sensor under "sensor:".
#   2. ADC attenuation "11db" was renamed "12db" in ESPHome 2024.x. The old value
#      still works but is deprecated.

esphome:
  name: rack-sensor-bridge
  friendly_name: "Rack Sensor Bridge"

esp32:
  board: esp32dev

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # If WiFi is lost for 15 minutes the node reboots and retries.
  # Relevant for 21-day unattended operation.
  reboot_timeout: 15min

  ap:
    ssid: "Rack Bridge Fallback"
    password: !secret ap_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_key
  # If HA does not connect for 15 minutes, reboot rather than sit in a bad state.
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota_password

# 1-Wire bus for the DS18B20. Declares the pin only.
# The sensor itself is defined under "sensor:" below.
one_wire:
  - platform: gpio
    pin: GPIO4

sensor:
  # --- Soil moisture: DFRobot SEN0193 ---
  # Datasheet: supply 3.3-5.5V, analog output 1.2-2.5V.
  # The relationship is inverse: higher voltage means drier soil.
  #
  # The two calibration points below are PLACEHOLDERS derived from the datasheet
  # range, not measured on a physical unit. Replace them with real readings:
  # hold the probe in open air for the dry point, submerge the tip for the wet point.
  - platform: adc
    pin: GPIO34
    name: "Soil Moisture"
    id: rack_moisture
    unit_of_measurement: "%"
    device_class: humidity
    icon: mdi:water-percent
    update_interval: 60s
    attenuation: 12db
    filters:
      # Median of 5 samples rejects single-sample noise before calibration.
      - median:
          window_size: 5
          send_every: 5
      - calibrate_linear:
          - 2.50 -> 0.0     # dry (open air)   <-- replace with measured value
          - 1.20 -> 100.0   # wet (submerged)  <-- replace with measured value
      - clamp:
          min_value: 0
          max_value: 100

  # --- Temperature: DS18B20 on the 1-Wire bus above ---
  # The address below is a PLACEHOLDER. On first boot the device prints the real
  # 64-bit address in the ESPHome log; copy it here.
  # With a single device on the bus the address line can be omitted entirely.
  - platform: dallas_temp
    address: 0x0000000000000000
    name: "Temperature"
    id: rack_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 60s
